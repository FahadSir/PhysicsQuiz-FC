<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Physics Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
<style>
  :root {
    --bg:#f4f4f8; --surface:#fff; --card:#fff;
    --border:#e0e0ee; --accent:#6c63ff; --accent2:#ff6584;
    --text:#1a1a2e; --muted:#888; --input-bg:#f8f8fc;
    --success:#16a34a; --warning:#d97706; --danger:#dc2626;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; }

  nav {
    background:var(--surface);
    border-bottom:1px solid var(--border);
    padding:16px 40px;
    display:flex; align-items:center; justify-content:space-between;
    position:sticky; top:0; z-index:100;
    box-shadow:0 2px 12px rgba(0,0,0,0.05);
  }
  .logo { font-family:'Playfair Display',serif; font-size:1.3rem; color:var(--text); }
  .logo span { color:var(--accent); }

  /* Timer */
  #timerBox {
    display:flex; align-items:center; gap:10px;
    background:var(--accent); color:#fff;
    padding:10px 20px; border-radius:12px;
    font-weight:600; font-size:1.1rem;
    transition:background 0.3s;
    box-shadow:0 4px 16px rgba(108,99,255,0.3);
  }
  #timerBox.warn { background:#d97706; box-shadow:0 4px 16px rgba(217,119,6,0.3); }
  #timerBox.danger { background:#dc2626; animation:pulse 1s infinite; box-shadow:0 4px 16px rgba(220,38,38,0.4); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.7} }

  main { max-width:800px; margin:0 auto; padding:32px 24px 80px; }

  /* Pages */
  .page { display:none; }
  .page.active { display:block; }

  /* Intro */
  #introPage {
    min-height:calc(100vh - 70px);
    display:none; align-items:center; justify-content:center; padding:40px 24px;
  }
  #introPage.active { display:flex; }
  .intro-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:20px; padding:48px 40px; max-width:520px; width:100%;
    box-shadow:0 8px 40px rgba(0,0,0,0.08);
  }
  .quiz-badge {
    display:inline-block; background:rgba(108,99,255,0.1);
    color:var(--accent); font-size:0.78rem; font-weight:600;
    letter-spacing:1.5px; text-transform:uppercase; padding:5px 14px;
    border-radius:100px; margin-bottom:16px;
  }
  .intro-card h1 { font-family:'Playfair Display',serif; font-size:2rem; margin-bottom:8px; }
  .intro-card .desc { color:var(--muted); font-size:0.92rem; line-height:1.6; margin-bottom:28px; }
  .quiz-meta { display:flex; gap:20px; margin-bottom:28px; flex-wrap:wrap; }
  .meta-item { display:flex; align-items:center; gap:8px; font-size:0.88rem; color:var(--muted); }
  .meta-item strong { color:var(--text); }
  .field { margin-bottom:16px; }
  .field label { display:block; font-size:0.8rem; font-weight:600; color:var(--muted); letter-spacing:0.5px; text-transform:uppercase; margin-bottom:6px; }
  .field input, .field select {
    width:100%; background:var(--input-bg); border:1px solid var(--border);
    color:var(--text); padding:12px 14px; border-radius:10px;
    font-size:0.95rem; font-family:'DM Sans',sans-serif; transition:border-color 0.2s;
  }
  .field input:focus, .field select:focus { outline:none; border-color:var(--accent); }
  .optional-tag { font-size:0.72rem; color:var(--muted); margin-left:6px; }
  .btn {
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    padding:13px 28px; border-radius:10px;
    font-size:0.95rem; font-weight:600; cursor:pointer;
    border:none; transition:all 0.2s; font-family:'DM Sans',sans-serif;
  }
  .btn-primary { background:var(--accent); color:#fff; width:100%; box-shadow:0 4px 16px rgba(108,99,255,0.3); }
  .btn-primary:hover { background:#5a52e0; transform:translateY(-1px); }
  #startErr { color:var(--danger); font-size:0.85rem; margin-top:10px; min-height:20px; }

  /* Quiz */
  #quizPage { animation:fadeIn 0.4s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

  /* Progress */
  .progress-bar-wrap {
    background:var(--border); border-radius:100px; height:6px; margin-bottom:28px; overflow:hidden;
  }
  .progress-bar {
    height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2));
    border-radius:100px; transition:width 0.4s;
  }
  .quiz-info-row {
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:10px; font-size:0.85rem; color:var(--muted);
  }

  /* Question card */
  .q-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:16px; padding:32px; margin-bottom:24px;
    box-shadow:0 2px 12px rgba(0,0,0,0.04);
    animation:fadeIn 0.3s ease;
  }
  .q-meta {
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:16px;
  }
  .q-num-badge {
    background:var(--accent); color:#fff; padding:4px 14px;
    border-radius:100px; font-size:0.82rem; font-weight:600;
  }
  .q-pts { font-size:0.82rem; color:var(--muted); }
  .q-type-label {
    font-size:0.75rem; font-weight:600; letter-spacing:1px; text-transform:uppercase;
    color:var(--accent); margin-bottom:8px;
  }
  .q-text { font-size:1.05rem; line-height:1.7; margin-bottom:20px; }
  .q-instruction { font-size:0.8rem; color:var(--muted); margin-bottom:12px; font-style:italic; }

  /* Options */
  .option-list { display:flex; flex-direction:column; gap:10px; }
  .option-item {
    display:flex; align-items:center; gap:14px;
    padding:14px 18px; border-radius:12px;
    border:2px solid var(--border); cursor:pointer;
    transition:all 0.15s; background:var(--surface);
    user-select:none;
  }
  .option-item:hover { border-color:var(--accent); background:rgba(108,99,255,0.04); }
  .option-item.selected { border-color:var(--accent); background:rgba(108,99,255,0.08); }
  .option-item input { display:none; }
  .opt-circle {
    width:22px; height:22px; border-radius:50%;
    border:2px solid var(--border); flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    transition:all 0.15s;
  }
  .opt-square {
    width:22px; height:22px; border-radius:6px;
    border:2px solid var(--border); flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    transition:all 0.15s;
  }
  .option-item.selected .opt-circle,
  .option-item.selected .opt-square {
    background:var(--accent); border-color:var(--accent);
  }
  .opt-check { color:#fff; font-size:0.8rem; opacity:0; }
  .option-item.selected .opt-check { opacity:1; }
  .opt-label { font-size:0.92rem; }

  /* Short answer */
  .short-input {
    width:100%; background:var(--input-bg); border:2px solid var(--border);
    color:var(--text); padding:14px 16px; border-radius:12px;
    font-size:0.95rem; font-family:'DM Sans',sans-serif; resize:vertical;
    transition:border-color 0.2s;
  }
  .short-input:focus { outline:none; border-color:var(--accent); }

  /* Nav buttons */
  .q-nav { display:flex; align-items:center; justify-content:space-between; margin-top:8px; }
  .btn-nav {
    padding:10px 24px; border-radius:10px; font-size:0.9rem;
    font-weight:500; cursor:pointer; border:none;
    font-family:'DM Sans',sans-serif; transition:all 0.2s;
  }
  .btn-prev { background:transparent; border:1px solid var(--border); color:var(--text); }
  .btn-prev:hover { border-color:var(--accent); color:var(--accent); }
  .btn-next { background:var(--accent); color:#fff; }
  .btn-next:hover { background:#5a52e0; }
  .btn-submit { background:#16a34a; color:#fff; }
  .btn-submit:hover { background:#15803d; }

  /* Question dots */
  .q-dots { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:24px; }
  .q-dot {
    width:32px; height:32px; border-radius:8px;
    border:1px solid var(--border); background:var(--surface);
    display:flex; align-items:center; justify-content:center;
    font-size:0.78rem; font-weight:600; cursor:pointer;
    transition:all 0.15s; color:var(--muted);
  }
  .q-dot.answered { background:rgba(108,99,255,0.12); border-color:var(--accent); color:var(--accent); }
  .q-dot.current { background:var(--accent); border-color:var(--accent); color:#fff; }

  /* Results */
  #resultsPage { animation:fadeIn 0.5s ease; }
  .results-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:20px; padding:40px; text-align:center; margin-bottom:28px;
    box-shadow:0 4px 24px rgba(0,0,0,0.06);
  }
  .score-circle {
    width:120px; height:120px; border-radius:50%;
    background:conic-gradient(var(--accent) 0%, var(--border) 0%);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    margin:0 auto 24px; position:relative;
    box-shadow:0 0 40px rgba(108,99,255,0.2);
  }
  .score-pct { font-family:'Playfair Display',serif; font-size:2rem; font-weight:700; color:var(--accent); }
  .score-label { font-size:0.75rem; color:var(--muted); }
  .grade-banner {
    display:inline-block; font-size:1.3rem; font-weight:700;
    padding:8px 24px; border-radius:12px; margin-bottom:12px;
  }
  .review-list { display:flex; flex-direction:column; gap:16px; }
  .review-item {
    background:var(--surface); border:1px solid var(--border);
    border-radius:14px; padding:20px; text-align:left;
  }
  .review-item.correct { border-left:4px solid var(--success); }
  .review-item.wrong { border-left:4px solid var(--danger); }
  .review-q { font-size:0.95rem; margin-bottom:10px; }
  .review-ans { font-size:0.85rem; }
  .ans-given { color:var(--danger); }
  .ans-correct { color:var(--success); }
  .ans-ok { color:var(--success); }

  footer {
    text-align:center; padding:28px 24px; border-top:1px solid var(--border);
    color:var(--muted); font-size:0.82rem; margin-top:40px;
  }
  footer strong { color:var(--text); }

  @media(max-width:600px) {
    nav { padding:14px 20px; }
    main { padding:20px 16px 60px; }
    .intro-card { padding:32px 24px; }
    .q-card { padding:24px; }
  }
</style>
</head>
<body>

<nav>
  <div class="logo">Physics<span>Quiz</span></div>
  <div id="timerBox" style="display:none">
    <span>⏱</span>
    <span id="timerDisplay">30:00</span>
  </div>
</nav>

<!-- INTRO PAGE -->
<div id="introPage" class="page active">
  <div class="intro-card">
    <div id="noquiz" style="display:none;text-align:center;color:var(--muted);padding:20px 0">
      <div style="font-size:3rem;margin-bottom:12px">📭</div>
      <h3 style="color:var(--text);margin-bottom:8px">No Quiz Available</h3>
      <p>Your teacher hasn't published a quiz yet. Please check back later.</p>
    </div>
    <div id="quizInfo">
      <div class="quiz-badge">⚛ Physics Quiz</div>
      <h1 id="quizTitleDisplay">Loading…</h1>
      <p class="desc" id="quizDescDisplay"></p>
      <div class="quiz-meta">
        <div class="meta-item">⏱ <strong><span id="timeMeta">—</span> min</strong></div>
        <div class="meta-item">❓ <strong><span id="qMeta">—</span> questions</strong></div>
        <div class="meta-item">📊 <strong><span id="ptsMeta">—</span> pts total</strong></div>
      </div>
      <div class="field">
        <label>Your Full Name</label>
        <input type="text" id="sName" placeholder="e.g. Arif Hossain" autocomplete="name">
      </div>
      <div class="field">
        <label>Class / Section</label>
        <input type="text" id="sClass" placeholder="e.g. Class 10 / Section A">
      </div>
      <div class="field">
        <label>Student ID <span class="optional-tag">optional</span></label>
        <input type="text" id="sId" placeholder="Student roll or ID">
      </div>
      <div class="field">
        <label>Email <span class="optional-tag">optional</span></label>
        <input type="email" id="sEmail" placeholder="your@email.com">
      </div>
      <button class="btn btn-primary" onclick="startQuiz()">Start Quiz →</button>
      <div id="startErr"></div>
    </div>
  </div>
</div>

<!-- QUIZ PAGE -->
<div id="quizPage" class="page">
<main>
  <div id="qDots" class="q-dots"></div>
  <div class="quiz-info-row">
    <span id="qProgress">Question 1 of ?</span>
    <span id="qAnswered">0 answered</span>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progressBar" style="width:0%"></div>
  </div>
  <div id="questionArea"></div>
</main>
</div>

<!-- RESULTS PAGE -->
<div id="resultsPage" class="page">
<main>
  <div class="results-card">
    <div class="score-circle" id="scoreCircle">
      <div class="score-pct" id="scorePct">0%</div>
      <div class="score-label">score</div>
    </div>
    <div id="gradeBanner" class="grade-banner"></div>
    <h2 style="font-family:'Playfair Display',serif;font-size:1.8rem;margin-bottom:8px" id="resultName"></h2>
    <p style="color:var(--muted)" id="resultSub"></p>
    <div style="margin-top:20px;display:grid;grid-template-columns:repeat(3,1fr);gap:16px;text-align:center">
      <div><div style="font-size:1.5rem;font-weight:700;color:var(--accent)" id="resScore">—</div><div style="font-size:0.8rem;color:var(--muted)">Score</div></div>
      <div><div style="font-size:1.5rem;font-weight:700;color:var(--success)" id="resCorrect">—</div><div style="font-size:0.8rem;color:var(--muted)">Correct</div></div>
      <div><div style="font-size:1.5rem;font-weight:700;color:var(--danger)" id="resWrong">—</div><div style="font-size:0.8rem;color:var(--muted)">Wrong</div></div>
    </div>
  </div>
  <div id="showAnsSection">
    <h3 style="font-size:1.1rem;font-weight:600;margin-bottom:16px">📋 Answer Review</h3>
    <div class="review-list" id="reviewList"></div>
  </div>
  <div style="text-align:center;margin-top:28px">
    <button class="btn btn-primary" style="max-width:300px" onclick="location.reload()">🔄 Retake / New Student</button>
  </div>
</main>
</div>

<footer><strong>Fahad Chowdhury</strong></footer>

<script>
// ─── LOAD QUIZ ────────────────────────────────────────────────────────────────
const SCRIPT_URL = localStorage.getItem('quizScriptUrl') || '';
let quizData = null;
let studentAnswers = [];
let currentQ = 0;
let timerInterval = null;
let timeLeft = 0;
let studentInfo = {};

function loadQuiz() {
  // Try localStorage first (same-device publish)
  const raw = localStorage.getItem('publishedQuiz');
  if (raw) {
    quizData = JSON.parse(raw);
    initIntro();
    return;
  }
  // Try server
  if (SCRIPT_URL) {
    fetch(`${SCRIPT_URL}?action=getQuiz`)
      .then(r=>r.json())
      .then(data => {
        if (data.quiz) { quizData = data.quiz; initIntro(); }
        else showNoQuiz();
      })
      .catch(() => showNoQuiz());
    return;
  }
  showNoQuiz();
}

function showNoQuiz() {
  document.getElementById('quizInfo').style.display = 'none';
  document.getElementById('noquiz').style.display = 'block';
}

function initIntro() {
  const m = quizData.meta;
  document.title = m.title + ' — PhysicsQuiz';
  document.getElementById('quizTitleDisplay').textContent = m.title;
  document.getElementById('quizDescDisplay').textContent = m.desc || '';
  document.getElementById('timeMeta').textContent = m.time;
  document.getElementById('qMeta').textContent = quizData.questions.length;
  document.getElementById('ptsMeta').textContent = quizData.questions.reduce((s,q)=>s+q.pts,0);
  studentAnswers = new Array(quizData.questions.length).fill(null);
  if (window.MathJax) MathJax.typesetPromise && MathJax.typesetPromise();
}

loadQuiz();

// ─── START ────────────────────────────────────────────────────────────────────
function startQuiz() {
  const name = document.getElementById('sName').value.trim();
  const cls = document.getElementById('sClass').value.trim();
  if (!name) { document.getElementById('startErr').textContent = '⚠ Please enter your name'; return; }
  if (!cls) { document.getElementById('startErr').textContent = '⚠ Please enter your class'; return; }
  studentInfo = {
    name, class: cls,
    id: document.getElementById('sId').value.trim(),
    email: document.getElementById('sEmail').value.trim()
  };
  showPage('quizPage');
  startTimer(quizData.meta.time * 60);
  renderQuestion(0);
  renderDots();
}

// ─── TIMER ────────────────────────────────────────────────────────────────────
function startTimer(seconds) {
  timeLeft = seconds;
  const box = document.getElementById('timerBox');
  box.style.display = 'flex';
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimerDisplay();
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      autoSubmit();
    }
    // Warning states
    if (timeLeft <= 60) { box.className = 'danger'; }
    else if (timeLeft <= 300) { box.className = 'warn'; }
  }, 1000);
}
function updateTimerDisplay() {
  const m = Math.floor(timeLeft/60);
  const s = timeLeft % 60;
  document.getElementById('timerDisplay').textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
function autoSubmit() {
  // Flash warning
  document.getElementById('timerDisplay').textContent = '00:00';
  submitQuiz(true);
}

// ─── RENDER QUESTION ─────────────────────────────────────────────────────────
function renderQuestion(idx) {
  currentQ = idx;
  const q = quizData.questions[idx];
  const total = quizData.questions.length;
  const answered = studentAnswers.filter(a=>a!==null).length;

  document.getElementById('qProgress').textContent = `Question ${idx+1} of ${total}`;
  document.getElementById('qAnswered').textContent = `${answered} answered`;
  document.getElementById('progressBar').style.width = `${((idx+1)/total)*100}%`;

  const area = document.getElementById('questionArea');
  const typeLabels = { mcq:'Multiple Choice', multi:'Select All That Apply', tf:'True / False', short:'Short Answer' };

  let optionsHtml = '';
  if (q.type === 'mcq' || q.type === 'tf') {
    const saved = studentAnswers[idx];
    optionsHtml = `<div class="option-list">` +
      q.options.map((opt,i) => `
        <label class="option-item${saved===i?' selected':''}" onclick="selectOption(${idx},${i},this,'mcq')">
          <div class="opt-circle"><span class="opt-check">✓</span></div>
          <span class="opt-label">${opt}</span>
        </label>`).join('') +
      `</div>`;
  } else if (q.type === 'multi') {
    const saved = studentAnswers[idx] || [];
    optionsHtml = `<div class="q-instruction">Select all correct answers</div><div class="option-list">` +
      q.options.map((opt,i) => `
        <label class="option-item${saved.includes(i)?' selected':''}" onclick="selectOption(${idx},${i},this,'multi')">
          <div class="opt-square"><span class="opt-check">✓</span></div>
          <span class="opt-label">${opt}</span>
        </label>`).join('') +
      `</div>`;
  } else {
    const saved = studentAnswers[idx] || '';
    optionsHtml = `<textarea class="short-input" rows="3" id="shortField" placeholder="Type your answer here…" oninput="saveShort(${idx})">${saved}</textarea>`;
  }

  area.innerHTML = `
    <div class="q-card">
      <div class="q-meta">
        <span class="q-num-badge">Q${idx+1}</span>
        <span class="q-pts">${q.pts} pt${q.pts!==1?'s':''}</span>
      </div>
      <div class="q-type-label">${typeLabels[q.type]}</div>
      <div class="q-text">${q.text}</div>
      ${optionsHtml}
      <div class="q-nav" style="margin-top:20px">
        ${idx>0 ? `<button class="btn-nav btn-prev" onclick="renderQuestion(${idx-1})">← Previous</button>` : '<span></span>'}
        ${idx < total-1
          ? `<button class="btn-nav btn-next" onclick="renderQuestion(${idx+1})">Next →</button>`
          : `<button class="btn-nav btn-submit" onclick="confirmSubmit()">✅ Submit Quiz</button>`}
      </div>
    </div>`;

  renderDots();
  if (window.MathJax) MathJax.typesetPromise && MathJax.typesetPromise();
}

function selectOption(qIdx, optIdx, el, type) {
  if (type === 'mcq' || type === 'tf') {
    studentAnswers[qIdx] = optIdx;
    el.closest('.option-list').querySelectorAll('.option-item').forEach(i=>i.classList.remove('selected'));
    el.classList.add('selected');
  } else {
    // multi
    if (!studentAnswers[qIdx]) studentAnswers[qIdx] = [];
    const arr = studentAnswers[qIdx];
    if (arr.includes(optIdx)) {
      arr.splice(arr.indexOf(optIdx), 1);
      el.classList.remove('selected');
    } else {
      arr.push(optIdx);
      el.classList.add('selected');
    }
  }
  renderDots();
  updateProgress();
}
function saveShort(qIdx) {
  studentAnswers[qIdx] = document.getElementById('shortField').value;
  renderDots();
  updateProgress();
}
function updateProgress() {
  const answered = studentAnswers.filter(a=>a!==null && a!=='' && !(Array.isArray(a)&&a.length===0)).length;
  document.getElementById('qAnswered').textContent = `${answered} answered`;
}

function renderDots() {
  const div = document.getElementById('qDots');
  div.innerHTML = quizData.questions.map((_,i) => {
    const ans = studentAnswers[i];
    const hasAns = ans !== null && ans !== '' && !(Array.isArray(ans) && ans.length === 0);
    const cls = i === currentQ ? 'current' : hasAns ? 'answered' : '';
    return `<div class="q-dot ${cls}" onclick="renderQuestion(${i})">${i+1}</div>`;
  }).join('');
}

function confirmSubmit() {
  const answered = studentAnswers.filter(a=>a!==null && a!=='' && !(Array.isArray(a)&&a.length===0)).length;
  const total = quizData.questions.length;
  if (answered < total) {
    if (!confirm(`You have answered ${answered} of ${total} questions. Submit anyway?`)) return;
  }
  submitQuiz(false);
}

// ─── SUBMIT ───────────────────────────────────────────────────────────────────
function submitQuiz(auto) {
  clearInterval(timerInterval);
  document.getElementById('timerBox').style.display = 'none';

  const questions = quizData.questions;
  let score = 0, correct = 0, wrong = 0;
  const answerDetails = [];

  questions.forEach((q, i) => {
    const given = studentAnswers[i];
    let isCorrect = false;

    if (q.type === 'mcq' || q.type === 'tf') {
      // correct is array of indices
      const correctIdx = q.correct[0];
      isCorrect = (given === correctIdx || given === Number(correctIdx));
    } else if (q.type === 'multi') {
      const givenSet = new Set((given||[]).map(Number));
      const correctSet = new Set(q.correct.map(Number));
      isCorrect = givenSet.size === correctSet.size && [...givenSet].every(v=>correctSet.has(v));
    } else {
      // short answer — keyword matching
      const givenStr = (given||'').toLowerCase().trim();
      const keywords = q.correct[0].toLowerCase().split(',').map(k=>k.trim());
      isCorrect = keywords.some(k => givenStr.includes(k));
    }

    if (isCorrect) { score += q.pts; correct++; }
    else wrong++;

    let givenLabel = '';
    if (q.type === 'mcq' || q.type === 'tf') {
      givenLabel = given !== null ? (q.options[given] || '—') : '(not answered)';
    } else if (q.type === 'multi') {
      givenLabel = (given||[]).map(j=>q.options[j]).join(', ') || '(not answered)';
    } else {
      givenLabel = given || '(not answered)';
    }

    let correctLabel = '';
    if (q.type === 'short') {
      correctLabel = q.correct[0];
    } else if (q.type === 'multi') {
      correctLabel = q.correct.map(j=>q.options[j]).join(', ');
    } else {
      correctLabel = q.options[q.correct[0]] || q.correct[0];
    }

    answerDetails.push({ q: q.text, given: givenLabel, correctAns: correctLabel, correct: isCorrect, pts: q.pts });
  });

  const totalPts = questions.reduce((s,q)=>s+q.pts, 0);
  const pct = Math.round((score/totalPts)*100);
  const now = new Date();

  // Save result
  const result = {
    name: studentInfo.name,
    class: studentInfo.class,
    id: studentInfo.id,
    email: studentInfo.email,
    score, total: totalPts, pct, correct, wrong,
    time: now.toLocaleString(),
    answers: answerDetails
  };

  // Store locally
  const existing = JSON.parse(localStorage.getItem('quizResults')||'[]');
  existing.push(result);
  localStorage.setItem('quizResults', JSON.stringify(existing));

  // Send to server
  if (SCRIPT_URL) {
    fetch(SCRIPT_URL, {
      method:'POST',
      body: JSON.stringify({ action:'saveResult', result }),
      headers:{'Content-Type':'application/json'}
    }).catch(()=>{});
  }

  showResults(result, quizData.meta.showAns);
}

// ─── RESULTS PAGE ─────────────────────────────────────────────────────────────
function showResults(result, showAns) {
  showPage('resultsPage');
  const pct = result.pct;
  
  // Animate circle
  const circle = document.getElementById('scoreCircle');
  circle.style.background = `conic-gradient(var(--accent) ${pct*3.6}deg, var(--border) ${pct*3.6}deg)`;
  document.getElementById('scorePct').textContent = pct+'%';
  document.getElementById('resScore').textContent = `${result.score}/${result.total}`;
  document.getElementById('resCorrect').textContent = result.correct;
  document.getElementById('resWrong').textContent = result.wrong;

  let grade, gStyle;
  if (pct>=90){grade='Excellent! 🌟';gStyle='background:rgba(22,163,74,0.1);color:var(--success)';}
  else if (pct>=70){grade='Good Job! 👍';gStyle='background:rgba(108,99,255,0.1);color:var(--accent)';}
  else if (pct>=50){grade='Keep Practicing 📚';gStyle='background:rgba(217,119,6,0.1);color:var(--warning)';}
  else{grade='Needs Improvement 💪';gStyle='background:rgba(220,38,38,0.1);color:var(--danger)';}

  document.getElementById('gradeBanner').textContent = grade;
  document.getElementById('gradeBanner').style.cssText += gStyle;
  document.getElementById('resultName').textContent = result.name;
  document.getElementById('resultSub').textContent = `${result.class} · ${result.time}`;

  // Answer review
  if (showAns === 'never') {
    document.getElementById('showAnsSection').style.display = 'none';
  } else {
    const list = document.getElementById('reviewList');
    list.innerHTML = result.answers.map((a,i)=>`
      <div class="review-item ${a.correct?'correct':'wrong'}">
        <div class="review-q"><strong>Q${i+1}.</strong> ${a.q}</div>
        <div class="review-ans">
          ${a.correct
            ? `<span class="ans-ok">✓ Correct — ${a.given}</span>`
            : `<span class="ans-given">✗ Your answer: ${a.given}</span> &nbsp; 
               <span class="ans-correct">✓ Correct: ${a.correctAns}</span>`}
          <span style="float:right;color:var(--muted);font-size:0.8rem">${a.pts} pt${a.pts!==1?'s':''}</span>
        </div>
      </div>`).join('');
    if (window.MathJax) MathJax.typesetPromise && MathJax.typesetPromise();
  }
}

// ─── UTIL ─────────────────────────────────────────────────────────────────────
function showPage(id) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
</script>
